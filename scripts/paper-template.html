<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}]});"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a2e;
  --text:#e4e4ef;--text-dim:#9494a7;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-dim:rgba(108,92,231,0.15);
  --border:#2a2a3e;--code-bg:#0d0d14;
  --success:#00b894;--warning:#fdcb6e;--error:#e17055;
  --font-body:Inter,system-ui,-apple-system,sans-serif;
  --font-mono:'SF Mono','Fira Code','JetBrains Mono',monospace;
  --max-w:860px;--sidebar-w:260px
}
html{scroll-behavior:smooth;font-size:17px}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.75;-webkit-font-smoothing:antialiased}
a{color:var(--accent2);text-decoration:none;transition:color .2s}
a:hover{color:var(--accent);text-decoration:underline}

.page-wrapper{display:flex;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem;overflow-y:auto;z-index:100;transition:transform .3s}
.sidebar-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.sidebar-header a{font-size:.85rem;color:var(--text-dim);display:flex;align-items:center;gap:.4rem}
.sidebar-header a:hover{color:var(--accent2)}
.sidebar-title{font-size:.8rem;font-weight:600;color:var(--accent2);margin-top:.5rem;letter-spacing:.03em}

.toc-nav{font-size:.82rem}
.toc-nav ul{list-style:none;padding:0}
.toc-nav li{margin-bottom:.25rem}
.toc-nav a{display:block;padding:.3rem .6rem;border-radius:6px;color:var(--text-dim);transition:all .15s;font-size:.8rem;line-height:1.4}
.toc-nav a:hover,.toc-nav a.active{background:var(--accent-dim);color:var(--accent2);text-decoration:none}
.toc-nav ul ul{padding-left:.8rem}
.toc-nav ul ul a{font-size:.75rem}

.main-content{margin-left:var(--sidebar-w);flex:1;max-width:var(--max-w);padding:3rem 2.5rem 4rem}

.paper-header{margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.paper-part{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);background:var(--accent-dim);padding:4px 12px;border-radius:100px;display:inline-block;margin-bottom:1rem}
.paper-header h1{font-size:2rem;font-weight:800;letter-spacing:-.03em;line-height:1.2;margin-bottom:.5rem;background:linear-gradient(135deg,var(--text),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.paper-subtitle{font-size:1rem;color:var(--text-dim);margin-bottom:1rem}
.paper-meta-row{display:flex;gap:1rem;flex-wrap:wrap;font-size:.82rem;color:var(--text-dim)}
.paper-meta-row a{font-size:.82rem}

h1,h2,h3,h4,h5,h6{color:var(--text);letter-spacing:-.01em;margin-top:2.5rem;margin-bottom:.8rem}
h2{font-size:1.5rem;font-weight:700;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
h3{font-size:1.2rem;font-weight:600}
h4{font-size:1.05rem;font-weight:600;color:var(--accent2)}

p{margin-bottom:1rem}
ul,ol{margin-bottom:1rem;padding-left:1.5rem}
li{margin-bottom:.3rem}

code{font-family:var(--font-mono);font-size:.88em;background:var(--code-bg);color:var(--accent2);padding:.15em .4em;border-radius:4px}
pre{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:1.2rem 1.5rem;overflow-x:auto;margin:1.5rem 0;line-height:1.5}
pre code{background:none;padding:0;font-size:.85rem;color:var(--text)}

.sourceCode{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:1.2rem 1.5rem;overflow-x:auto;margin:1.5rem 0}
.sourceCode pre{background:none;border:none;padding:0;margin:0}
.sourceCode code{font-size:.85rem;color:var(--text)}

blockquote{border-left:3px solid var(--accent);padding:.8rem 1.2rem;margin:1.5rem 0;background:var(--accent-dim);border-radius:0 8px 8px 0;color:var(--text-dim);font-style:italic}

table{width:100%;border-collapse:collapse;margin:1.5rem 0;font-size:.88rem}
th{text-align:left;padding:.6rem .8rem;background:var(--surface2);color:var(--accent2);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
td{padding:.6rem .8rem;border-bottom:1px solid var(--border);color:var(--text-dim)}
tr:hover td{background:rgba(108,92,231,0.03);color:var(--text)}

.theorem,.definition,.proposition,.lemma,.corollary,.invariant,.remark{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;padding:1.2rem 1.5rem;margin:1.5rem 0
}
.theorem-title,.def-title{font-weight:700;color:var(--accent2);margin-bottom:.5rem;font-size:.9rem}

figure{margin:1.5rem 0;text-align:center}
figcaption{font-size:.82rem;color:var(--text-dim);margin-top:.5rem;font-style:italic}
img{max-width:100%;height:auto;border-radius:8px}

.menu-toggle{display:none;position:fixed;top:1rem;left:1rem;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .7rem;color:var(--text);cursor:pointer;font-size:1.2rem}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0;padding:2rem 1.2rem}
  .menu-toggle{display:block}
}

#TOC{display:none}
.header-section-number{color:var(--accent);margin-right:.4rem;font-weight:600}
</style>
</head>
<body>
<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>
<div class="page-wrapper">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="../index.html">&larr; All Papers</a>
    <div class="sidebar-title">{{TITLE}}</div>
  </div>
  <nav class="toc-nav" id="toc-nav"></nav>
  <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)">
    <a href="{{PDF_LINK}}" style="font-size:.8rem;color:var(--accent2);display:flex;align-items:center;gap:.4rem">PDF Version &darr;</a>
  </div>
</aside>
<main class="main-content" id="content">
  <div class="paper-header">
    <span class="paper-part">{{PART}}</span>
    <h1 style="margin-top:0">{{TITLE}}</h1>
    <div class="paper-meta-row">
      <span>Matthew Long</span>
      <span>&middot;</span>
      <span>YonedaAI Research Collective</span>
      <span>&middot;</span>
      <span>Chicago, IL</span>
      <span>&middot;</span>
      <a href="{{PDF_LINK}}">PDF</a>
    </div>
  </div>
{{BODY}}
</main>
</div>
<script>
// Build sidebar TOC from h2/h3 in content
(function(){
  var nav=document.getElementById('toc-nav');
  var headings=document.querySelectorAll('.main-content h2, .main-content h3');
  if(!headings.length)return;
  var items=[];
  for(var i=0;i<headings.length;i++){
    var h=headings[i];
    if(!h.id){
      h.id=h.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'');
    }
    items.push({tag:h.tagName,id:h.id,text:h.textContent.trim()});
  }
  var ul=document.createElement('ul');
  var currentLi=null;
  var subUl=null;
  for(var j=0;j<items.length;j++){
    var item=items[j];
    var li=document.createElement('li');
    var a=document.createElement('a');
    a.href='#'+item.id;
    a.textContent=item.text;
    if(item.tag==='H2'){
      if(subUl&&currentLi){currentLi.appendChild(subUl);subUl=null;}
      li.appendChild(a);
      ul.appendChild(li);
      currentLi=li;
    } else {
      if(!subUl)subUl=document.createElement('ul');
      li.appendChild(a);
      subUl.appendChild(li);
    }
  }
  if(subUl&&currentLi)currentLi.appendChild(subUl);
  nav.appendChild(ul);

  // Active tracking on scroll
  var observer=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        var links=nav.querySelectorAll('a');
        for(var k=0;k<links.length;k++)links[k].classList.remove('active');
        var link=nav.querySelector('a[href="#'+e.target.id+'"]');
        if(link)link.classList.add('active');
      }
    });
  },{rootMargin:'-20% 0px -70% 0px'});
  for(var m=0;m<headings.length;m++)observer.observe(headings[m]);
})();
</script>
</body>
</html>
